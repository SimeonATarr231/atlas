<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atlas — Field Index of Africa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-wrapper">

      <header class="site-header">
        <div class="header-top">
          <span class="site-label">ATLAS</span>
          <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">☾</button>
        </div>
        <span class="site-sublabel">Field Index of Africa — Vol. I</span>
      </header>

      <div class="search-zone">
        <input
          type="text"
          class="search-input"
          id="searchInput"
          placeholder="Search by country, capital, or language..."
          autocomplete="off"
        />
        <span class="result-count" id="resultCount">54 entries</span>
      </div>

      <main class="main-content">
        <div class="entry-list" id="entryList" aria-label="Country entries">
          <!-- Entries injected by JavaScript -->
        </div>
        <div class="empty-state" id="emptyState" hidden>
          <span class="empty-mark">⌖</span>
          <span class="empty-text">No matching entries in the index.</span>
        </div>
      </main>

      <footer class="site-footer">
        <div class="footer-left">
          <span class="footer-brand">ATLAS</span>
          <span class="footer-meta">Field Index of Africa &mdash; v1.0</span>
          <span class="footer-legal">&copy; 2025 Tarr. All rights reserved.</span>
        </div>
        <div class="footer-right">
          <span class="footer-credit">Designed &amp; Built by</span>
          <a class="footer-name" href="https://github.com/SimeonATarr231" target="_blank" rel="noopener noreferrer">
            Simeon Aseon Tarr
          </a>
        </div>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
